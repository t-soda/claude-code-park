[package]
name = "claude-code-park"
version = "0.2.0"
description = "Claude Code Park — a desktop app to manage and improve Claude Code in a game-like way"
edition = "2021"
rust-version = "1.77"

[lib]
name = "claude_code_park_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
ts-rs = "10"
notify = "7"
notify-debouncer-full = "0.4"
serde_yaml = "0.9"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
glob = "0.3"

[features]
# Keep the default feature generated by tauri
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
